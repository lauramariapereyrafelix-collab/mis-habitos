// SHOPPING
function setImpulse(val) {
  newImpulse=val;
  document.getElementById("imp-yes").className="impulse-btn"+(val===true?" sel":"");
  document.getElementById("imp-no").className="impulse-btn"+(val===false?" sel-no":"");
}
function addPurchase() {
  const name=document.getElementById("shop-name").value.trim();
  if(!name){ alert("Escribe qué compraste"); return; }
  const amount=parseFloat(document.getElementById("shop-amount").value)||0;
  const brand=document.getElementById("shop-brand").value.trim();
  const note=document.getElementById("shop-note").value.trim();
  purchases.unshift({ id:Date.now(), date:todayKey, name, amount, brand, note, impulse:newImpulse });
  savePurchases();
  document.getElementById("shop-name").value="";
  document.getElementById("shop-amount").value="";
  document.getElementById("shop-brand").value="";
  document.getElementById("shop-note").value="";
  newImpulse=null;
  document.getElementById("imp-yes").className="impulse-btn";
  document.getElementById("imp-no").className="impulse-btn";
  renderShopList();
}
function deletePurchase(id) { purchases=purchases.filter(p=>p.id!==id); savePurchases(); renderShopList(); }
function setFilter(f) {
  shopFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("filter-"+f).classList.add("active");
  renderShopList();
}
function renderShopList() {
  let filtered=purchases;
  if(shopFilter==="impulse") filtered=purchases.filter(p=>p.impulse===true);
  if(shopFilter==="planned") filtered=purchases.filter(p=>p.impulse===false);
  const total=filtered.reduce((s,p)=>s+(p.amount||0),0);
  const listEl=document.getElementById("shop-list");
  const totalRow=document.getElementById("shop-total-row");
  if(filtered.length===0){ listEl.innerHTML=`<div class="shop-empty">Sin compras registradas 🛍️</div>`; totalRow.style.display="none"; return; }
  listEl.innerHTML=filtered.map(p=>{
    const date=new Date(p.date+"T12:00:00").toLocaleDateString("es-MX",{day:"numeric",month:"short"});
    const tag=p.impulse===true?`<span class="impulse-tag yes">Impulsiva</span>`:p.impulse===false?`<span class="impulse-tag no">Planeada</span>`:"";
    const amtColor=p.impulse===true?"#f87171":"#f0ebe1";
    return `<div class="shop-item">
      <div style="flex:1">
        <div class="shop-item-name">${p.name}${tag}</div>
        <div class="shop-item-meta">${date}${p.brand?" · "+p.brand:""}${p.note?" · "+p.note:""}</div>
      </div>
      <div class="shop-item-right">
        ${p.amount?`<span class="shop-item-amount" style="color:${amtColor}">$${p.amount.toLocaleString("es-MX")}</span>`:""}
        <button class="shop-delete" onclick="deletePurchase(${p.id})">×</button>
      </div>
    </div>`;
  }).join("");
  totalRow.style.display="flex";
  document.getElementById("shop-total-amount").textContent="$"+total.toLocaleString("es-MX");
}

// STATS
function renderStats() {
  const entries=Object.entries(data);
  const good=entries.filter(([,e])=>getDayColor(e)==="good").length;
  const ok=entries.filter(([,e])=>getDayColor(e)==="ok").length;
  document.getElementById("stat-total").textContent=entries.length;
  document.getElementById("stat-good").textContent=good;
  document.getElementById("stat-ok").textContent=ok;
  let streak=0; const sorted=Object.keys(data).sort().reverse();
  for(const key of sorted){ if(getDayColor(data[key])) streak++; else break; }
  document.getElementById("stat-streak").textContent=streak;
  const empty=document.getElementById("stats-empty");
  const pc=document.getElementById("stat-progress-card"), hc=document.getElementById("stat-habits-card"), sc=document.getElementById("stat-shop-card");
  if(entries.length===0&&purchases.length===0){ empty.style.display="block"; pc.style.display="none"; hc.style.display="none"; sc.style.display="none"; return; }
  empty.style.display="none";
  if(entries.length>0){
    pc.style.display="block"; hc.style.display="block";
    const pct=Math.round(good/entries.length*100);
    document.getElementById("progress-fill").style.width=pct+"%";
    document.getElementById("progress-pct").textContent=pct+"%";
    document.getElementById("habits-bars").innerHTML=HABITS.map(h=>{
      const vals=entries.map(([,e])=>e.habits[h.id]).filter(v=>v!==undefined);
      const avg=vals.length?vals.reduce((a,b)=>a+SCORE_MAP[b],0)/vals.length/3:0;
      const p=Math.round(avg*100), col=avg>0.66?"#4ade80":avg>0.33?"#fbbf24":"#f87171";
      return `<div class="habit-bar"><div class="habit-bar-top"><span class="habit-bar-label">${h.icon} ${h.label}</span><span class="habit-bar-pct" style="color:${col}">${p}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:${col}"></div></div></div>`;
    }).join("");
  }
  if(purchases.length>0){
    sc.style.display="block";
    const imp=purchases.filter(p=>p.impulse===true).length;
    const total=purchases.reduce((s,p)=>s+(p.amount||0),0);
    document.getElementById("stat-shop-count").textContent=purchases.length;
    document.getElementById("stat-shop-impulse").textContent=imp;
    document.getElementById("stat-shop-total").textContent="$"+total.toLocaleString("es-MX");
    document.getElementById("stat-shop-impulse-pct").textContent=Math.round(imp/purchases.length*100)+"% impulsivas";
  } else sc.style.display="none";
}

renderShopList();
</script>
